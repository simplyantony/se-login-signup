<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Signup</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <div class="container">
        <h2>Sign Up</h2>
        <form>
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" name="firstname" placeholder="Please enter your first name." />

            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" name="lastname" placeholder="Please enter your last name." />

            <label for="userid">User ID</label>
            <input type="text" id="userid" name="userid" placeholder="Please enter your user ID." />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Please enter your password." />

            <button type="submit">Submit</button>
        </form>

        <p>Already have an account? <a href="Login_Setup.html">Login</a></p>
    </div>

</body>
</html>
